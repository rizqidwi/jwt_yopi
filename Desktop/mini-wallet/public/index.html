<!DOCTYPE html>
<html>
<head>
    <title>Mini Wallet</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #667eea, #764ba2); margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 10px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .tab { display: inline-block; width: 45%; padding: 10px; cursor: pointer; background: #f0f0f0; margin: 0 5px; border-radius: 5px; }
        .tab.active { background: #667eea; color: white; }
        .form { display: none; margin-top: 20px; }
        .form.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="tab active" onclick="showTab('login')">Login</div>
            <div class="tab" onclick="showTab('register')">Register</div>
        </div>
        <div id="loginForm" class="form active">
            <h2>Login</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Login</button>
            <div id="loginMsg"></div>
        </div>
        <div id="registerForm" class="form">
            <h2>Register</h2>
            <input type="text" id="regUsername" placeholder="Username">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password">
            <button onclick="register()">Register</button>
            <div id="regMsg"></div>
        </div>
    </div>
    <script>
        function showTab(tab) {
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.querySelectorAll('.tab')[0].classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const msg = document.getElementById('regMsg');
            
            try {
                const res = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (data.success) {
                    msg.className = 'success';
                    msg.innerText = 'Register berhasil! Silakan login.';
                    setTimeout(() => showTab('login'), 2000);
                } else {
                    msg.className = 'error';
                    msg.innerText = data.message;
                }
            } catch(e) {
                msg.className = 'error';
                msg.innerText = 'Terjadi kesalahan';
            }
        }
        
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('loginMsg');
            
            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                console.log('Login response:', data);
                
                if (data.success) {
                    // SIMPAN TOKEN KE LOCALSTORAGE
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    console.log('Token saved:', data.data.token);
                    console.log('User saved:', data.data.user);
                    
                    // Redirect ke dashboard
                    window.location.href = '/dashboard.html';
                } else {
                    msg.className = 'error';
                    msg.innerText = data.message;
                }
            } catch(e) {
                console.error('Login error:', e);
                msg.className = 'error';
                msg.innerText = 'Terjadi kesalahan';
            }
        }
    </script>
</body>
</html>
